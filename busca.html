  <link rel="stylesheet" href="/assets/css/estilo.css">
  <link rel="icon" href="/favicon.ico" sizes="any">
  <link rel="icon" type="image/png" sizes="16x16" href="/assets/img/favicon-16x16.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/assets/img/favicon-32x32.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/assets/img/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="192x192" href="/assets/img/android-chrome-192x192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="/assets/img/android-chrome-512x512.png">
</head>
<body>

<header class="site-header">
  <div class="header-inner">
    <a href="/" class="logo" aria-label="SAFIE Reforma Tributária — Página inicial">
      <span class="logo-marca">SAFIE <span>Reforma</span></span>
      <span class="logo-sub">Tributação &amp; Empresas</span>
    </a>
    <nav id="nav-principal" class="nav-principal" aria-label="Navegação principal">
      <a href="/">Home</a>
      <a href="/temas/">Temas</a>
      <a href="/sobre">Sobre</a>
      <a href="/busca" class="ativo">Busca</a>
    </nav>
    <button id="menu-toggle" class="menu-toggle" aria-label="Abrir menu">
      <span></span><span></span><span></span>
    </button>
  </div>
</header>

<main>
  <div class="busca-wrapper">
    <h1 style="font-size:1.8rem;font-weight:700;margin-bottom:8px;letter-spacing:-0.03em;">Buscar artigos</h1>
    <p style="color:var(--cinza);margin-bottom:28px;">Digite um termo para encontrar artigos sobre a reforma tributária e seus impactos para empresas.</p>

    <form id="form-busca" class="busca-form" role="search" aria-label="Busca de artigos">
      <input
        type="search"
        id="input-busca"
        name="q"
        placeholder="Ex: IBS, split payment, Simples Nacional, CBS, transição..."
        autocomplete="off"
        aria-label="Buscar artigos">
      <button type="submit">Buscar</button>
    </form>

    <p id="contagem-resultados" style="font-size:0.85rem;color:var(--cinza);margin-bottom:20px;"></p>

    <div id="resultados-busca"></div>
  </div>
</main>

<footer class="site-footer">
  <div class="footer-inner">
    <div class="footer-logo">SAFIE <span>Reforma</span></div>
    <nav class="footer-links">
      <a href="/">Home</a>
